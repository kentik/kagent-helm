suite: StatefulSet tests
templates:
  - statefulset.yaml
set:
  kagent.companyId: "12345"

tests:
  - it: should render a StatefulSet with default values
    asserts:
      - isKind:
          of: StatefulSet
      - equal:
          path: spec.replicas
          value: 1

  - it: should not include probes by default
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: K_HC_SERVER_ENABLED
            value: "true"
      - isNull:
          path: spec.template.spec.containers[0].livenessProbe
      - isNull:
          path: spec.template.spec.containers[0].readinessProbe

  - it: should include liveness and readiness probes when explicitly enabled
    set:
      livenessProbe:
        enabled: true
        httpGet:
          path: /hc
          port: 8099
      readinessProbe:
        enabled: true
        httpGet:
          path: /hc
          port: 8099
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: K_HC_SERVER_ENABLED
            value: "true"
      - isNotNull:
          path: spec.template.spec.containers[0].livenessProbe
      - isNotNull:
          path: spec.template.spec.containers[0].readinessProbe

  - it: should render without probes when livenessProbe and readinessProbe are absent
    set:
      livenessProbe: null
      readinessProbe: null
    asserts:
      - isKind:
          of: StatefulSet
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: K_HC_SERVER_ENABLED
            value: "true"
      - isNull:
          path: spec.template.spec.containers[0].livenessProbe
      - isNull:
          path: spec.template.spec.containers[0].readinessProbe

  - it: should render without probes when probes are explicitly disabled
    set:
      livenessProbe.enabled: false
      readinessProbe.enabled: false
    asserts:
      - isKind:
          of: StatefulSet
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: K_HC_SERVER_ENABLED
            value: "true"
      - isNull:
          path: spec.template.spec.containers[0].livenessProbe
      - isNull:
          path: spec.template.spec.containers[0].readinessProbe

  - it: should render only livenessProbe when readinessProbe is absent
    set:
      livenessProbe:
        enabled: true
        httpGet:
          path: /hc
          port: 8099
      readinessProbe: null
    asserts:
      - isNotNull:
          path: spec.template.spec.containers[0].livenessProbe
      - isNull:
          path: spec.template.spec.containers[0].readinessProbe
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: K_HC_SERVER_ENABLED
            value: "true"

  - it: should render only readinessProbe when livenessProbe is absent
    set:
      livenessProbe: null
      readinessProbe:
        enabled: true
        httpGet:
          path: /hc
          port: 8099
    asserts:
      - isNull:
          path: spec.template.spec.containers[0].livenessProbe
      - isNotNull:
          path: spec.template.spec.containers[0].readinessProbe
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: K_HC_SERVER_ENABLED
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: K_HC_SERVER_ADDRESS
            value: ":8099"

  - it: should use correct health check port from livenessProbe
    set:
      livenessProbe:
        enabled: true
        httpGet:
          path: /hc
          port: 9090
      readinessProbe.enabled: false
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: K_HC_SERVER_ADDRESS
            value: ":9090"

  - it: should set correct probe defaults when enabled
    set:
      livenessProbe:
        enabled: true
        httpGet:
          path: /hc
          port: 8099
      readinessProbe:
        enabled: true
        httpGet:
          path: /hc
          port: 8099
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.initialDelaySeconds
          value: 30
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.periodSeconds
          value: 10
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.timeoutSeconds
          value: 5
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.failureThreshold
          value: 3
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.initialDelaySeconds
          value: 5
